name: Deploy DEV

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  GCP_REGION: asia-northeast1

jobs:
  migrate-db:
    name: DB マイグレーション (DEV)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 依存関係インストール
        run: npm ci

      - name: Prisma マイグレーション実行
        run: npx prisma migrate deploy

  deploy-grading-worker:
    name: Deploy Grading Worker (DEV)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate-db]
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: GCP 認証 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: gcloud CLI セットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: デプロイ設定ファイル生成 (DEV Worker)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RUNTIME_SA_EMAIL: ${{ secrets.RUNTIME_SA_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_CHAT_MODEL: ${{ secrets.GEMINI_CHAT_MODEL }}
          GEMINI_CHAT_FALLBACK_MODEL: ${{ secrets.GEMINI_CHAT_FALLBACK_MODEL }}
          GEMINI_LIVE_MODEL: ${{ secrets.GEMINI_LIVE_MODEL }}
          GEMINI_LIVE_API_VERSION: ${{ secrets.GEMINI_LIVE_API_VERSION }}
          GEMINI_LIVE_VOICE: ${{ secrets.GEMINI_LIVE_VOICE }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GRADING_WORKER_URL: ${{ secrets.GRADING_WORKER_URL }}
          CLOUD_TASKS_LOCATION: ${{ secrets.CLOUD_TASKS_LOCATION }}
          GRADING_TASK_QUEUE: ${{ secrets.GRADING_TASK_QUEUE }}
          DRIVE_CHECK_TASK_QUEUE: ${{ secrets.DRIVE_CHECK_TASK_QUEUE }}
          CLOUD_TASKS_CALLER_SERVICE_ACCOUNT: ${{ secrets.CLOUD_TASKS_CALLER_SERVICE_ACCOUNT }}
          WORKER_SCHEDULER_CALLER_SERVICE_ACCOUNT: ${{ secrets.WORKER_SCHEDULER_CALLER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          for var in GCP_PROJECT_ID RUNTIME_SA_EMAIL GEMINI_API_KEY DRIVE_FOLDER_ID; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: ${var}"
              exit 1
            fi
          done

          WORKER_URL="$(gcloud run services describe sullivan-grading-worker-dev \
            --project "$GCP_PROJECT_ID" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)' 2>/dev/null || true)"

          if [ -z "$WORKER_URL" ]; then
            WORKER_URL="${GRADING_WORKER_URL:-}"
          fi

          if [ -z "$WORKER_URL" ]; then
            echo "Missing required secret: GRADING_WORKER_URL"
            exit 1
          fi

          cat > .env.DEV <<EOF
          GOOGLE_CLOUD_PROJECT_ID=$GCP_PROJECT_ID
          RUNTIME_SA_EMAIL=$RUNTIME_SA_EMAIL
          GEMINI_API_KEY=$GEMINI_API_KEY
          GEMINI_MODEL=${GEMINI_MODEL:-}
          GEMINI_CHAT_MODEL=${GEMINI_CHAT_MODEL:-}
          GEMINI_CHAT_FALLBACK_MODEL=${GEMINI_CHAT_FALLBACK_MODEL:-}
          GEMINI_LIVE_MODEL=${GEMINI_LIVE_MODEL:-}
          GEMINI_LIVE_API_VERSION=${GEMINI_LIVE_API_VERSION:-}
          GEMINI_LIVE_VOICE=${GEMINI_LIVE_VOICE:-}
          DRIVE_FOLDER_ID=$DRIVE_FOLDER_ID
          GRADING_WORKER_URL=$WORKER_URL
          CLOUD_TASKS_LOCATION=${CLOUD_TASKS_LOCATION:-asia-northeast1}
          GRADING_TASK_QUEUE=${GRADING_TASK_QUEUE:-sullivan-grading}
          DRIVE_CHECK_TASK_QUEUE=${DRIVE_CHECK_TASK_QUEUE:-sullivan-drive-check}
          CLOUD_TASKS_CALLER_SERVICE_ACCOUNT=${CLOUD_TASKS_CALLER_SERVICE_ACCOUNT:-$RUNTIME_SA_EMAIL}
          WORKER_SCHEDULER_CALLER_SERVICE_ACCOUNT=${WORKER_SCHEDULER_CALLER_SERVICE_ACCOUNT:-$RUNTIME_SA_EMAIL}
          CLOUD_RUN_REGION=${{ env.GCP_REGION }}
          EOF

      - name: Worker デプロイ (DEV)
        run: ./deploy-grading-worker-DEV.sh

  deploy-web:
    name: Deploy Web App (DEV)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate-db, deploy-grading-worker]
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: GCP 認証 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: gcloud CLI セットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: デプロイ設定ファイル生成 (DEV Web)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RUNTIME_SA_EMAIL: ${{ secrets.RUNTIME_SA_EMAIL }}
          APP_URL: ${{ secrets.APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS: ${{ secrets.NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_CHAT_MODEL: ${{ secrets.GEMINI_CHAT_MODEL }}
          GEMINI_CHAT_FALLBACK_MODEL: ${{ secrets.GEMINI_CHAT_FALLBACK_MODEL }}
          GEMINI_LIVE_MODEL: ${{ secrets.GEMINI_LIVE_MODEL }}
          GEMINI_LIVE_API_VERSION: ${{ secrets.GEMINI_LIVE_API_VERSION }}
          GEMINI_LIVE_VOICE: ${{ secrets.GEMINI_LIVE_VOICE }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          DRIVE_WEBHOOK_CHANNEL_ID: ${{ secrets.DRIVE_WEBHOOK_CHANNEL_ID }}
          DRIVE_WEBHOOK_CHANNEL_ID_FIXED: ${{ secrets.DRIVE_WEBHOOK_CHANNEL_ID_FIXED }}
          DRIVE_WATCH_RENEW_THRESHOLD_HOURS: ${{ secrets.DRIVE_WATCH_RENEW_THRESHOLD_HOURS }}
          DRIVE_WATCH_STATE_KEY: ${{ secrets.DRIVE_WATCH_STATE_KEY }}
          GRADING_WORKER_URL: ${{ secrets.GRADING_WORKER_URL }}
          CLOUD_TASKS_LOCATION: ${{ secrets.CLOUD_TASKS_LOCATION }}
          GRADING_TASK_QUEUE: ${{ secrets.GRADING_TASK_QUEUE }}
          DRIVE_CHECK_TASK_QUEUE: ${{ secrets.DRIVE_CHECK_TASK_QUEUE }}
          CLOUD_TASKS_CALLER_SERVICE_ACCOUNT: ${{ secrets.CLOUD_TASKS_CALLER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          for var in \
            GCP_PROJECT_ID \
            RUNTIME_SA_EMAIL \
            APP_URL \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            SUPABASE_SERVICE_ROLE_KEY \
            GEMINI_API_KEY \
            DRIVE_FOLDER_ID \
            DRIVE_WATCH_STATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: ${var}"
              exit 1
            fi
          done

          WORKER_URL="$(gcloud run services describe sullivan-grading-worker-dev \
            --project "$GCP_PROJECT_ID" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)' 2>/dev/null || true)"

          if [ -z "$WORKER_URL" ]; then
            WORKER_URL="${GRADING_WORKER_URL:-}"
          fi

          if [ -z "$WORKER_URL" ]; then
            echo "Missing required secret: GRADING_WORKER_URL"
            exit 1
          fi

          cat > .env.DEV <<EOF
          GOOGLE_CLOUD_PROJECT_ID=$GCP_PROJECT_ID
          RUNTIME_SA_EMAIL=$RUNTIME_SA_EMAIL
          APP_URL=$APP_URL
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
          NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS=${NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS:-500}
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          GEMINI_API_KEY=$GEMINI_API_KEY
          GEMINI_MODEL=${GEMINI_MODEL:-}
          GEMINI_CHAT_MODEL=${GEMINI_CHAT_MODEL:-}
          GEMINI_CHAT_FALLBACK_MODEL=${GEMINI_CHAT_FALLBACK_MODEL:-}
          GEMINI_LIVE_MODEL=${GEMINI_LIVE_MODEL:-}
          GEMINI_LIVE_API_VERSION=${GEMINI_LIVE_API_VERSION:-}
          GEMINI_LIVE_VOICE=${GEMINI_LIVE_VOICE:-}
          DRIVE_FOLDER_ID=$DRIVE_FOLDER_ID
          DRIVE_WEBHOOK_CHANNEL_ID=${DRIVE_WEBHOOK_CHANNEL_ID:-}
          DRIVE_WEBHOOK_CHANNEL_ID_FIXED=${DRIVE_WEBHOOK_CHANNEL_ID_FIXED:-false}
          DRIVE_WATCH_RENEW_THRESHOLD_HOURS=${DRIVE_WATCH_RENEW_THRESHOLD_HOURS:-18}
          DRIVE_WATCH_STATE_KEY=$DRIVE_WATCH_STATE_KEY
          GRADING_WORKER_URL=$WORKER_URL
          CLOUD_TASKS_LOCATION=${CLOUD_TASKS_LOCATION:-asia-northeast1}
          GRADING_TASK_QUEUE=${GRADING_TASK_QUEUE:-sullivan-grading}
          DRIVE_CHECK_TASK_QUEUE=${DRIVE_CHECK_TASK_QUEUE:-sullivan-drive-check}
          CLOUD_TASKS_CALLER_SERVICE_ACCOUNT=${CLOUD_TASKS_CALLER_SERVICE_ACCOUNT:-$RUNTIME_SA_EMAIL}
          EOF

      - name: Web デプロイ (DEV)
        id: deploy_web
        run: ./deploy-web-DEV.sh

      - name: Drive watch 再作成 (DEV)
        run: |
          set -euo pipefail

          SERVICE_URL="$(gcloud run services describe sullivan-app-dev \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)')"

          APP_INTERNAL_SECRET="$(gcloud secrets versions access latest \
            --secret internal-api-secret \
            --project "${{ secrets.GCP_PROJECT_ID }}")"

          curl --fail --silent --show-error \
            -X POST "${SERVICE_URL}/api/drive/watch/renew?check=1" \
            -H "Authorization: Bearer ${APP_INTERNAL_SECRET}" >/dev/null

      - name: Cloud Run 起動ログ取得 (Web, 失敗時)
        if: failure() && steps.deploy_web.outcome == 'failure'
        run: |
          echo "Cloud Run web deploy failed. Fetching diagnostic logs..."

          REVISION="$(gcloud run services describe sullivan-app-dev \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.latestCreatedRevisionName)' 2>/dev/null || true)"

          if [ -z "$REVISION" ]; then
            echo "Could not determine latest revision."
            exit 0
          fi

          echo "latestCreatedRevision=$REVISION"

          gcloud logging read \
            "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"sullivan-app-dev\" AND resource.labels.revision_name=\"$REVISION\"" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --limit=200 \
            --format='value(timestamp,logName,textPayload,jsonPayload.message,jsonPayload)' \
            || true
