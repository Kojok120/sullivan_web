name: Deploy DEV

on:
  push:
    branches: [dev]

# 同一ブランチでの重複デプロイをキャンセル
concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  GCP_REGION: asia-northeast1

jobs:
  deploy-web:
    name: Deploy Web App (DEV)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [migrate-db]
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: GCP 認証 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: gcloud CLI セットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker 認証
        run: gcloud auth configure-docker asia.gcr.io --quiet

      - name: Docker ビルド (Web)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS=${{ secrets.NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS }} \
            --build-arg QSTASH_CURRENT_SIGNING_KEY=${{ secrets.QSTASH_CURRENT_SIGNING_KEY }} \
            --build-arg QSTASH_NEXT_SIGNING_KEY=${{ secrets.QSTASH_NEXT_SIGNING_KEY }} \
            -t asia.gcr.io/${{ secrets.GCP_PROJECT_ID }}/sullivan-app-dev:${{ github.sha }} \
            .

      - name: Docker プッシュ (Web)
        run: docker push asia.gcr.io/${{ secrets.GCP_PROJECT_ID }}/sullivan-app-dev:${{ github.sha }}

      - name: Cloud Run デプロイ (Web)
        id: deploy_web
        run: |
          gcloud run deploy sullivan-app-dev \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --service-account "${{ secrets.RUNTIME_SA_EMAIL }}" \
            --image asia.gcr.io/${{ secrets.GCP_PROJECT_ID }}/sullivan-app-dev:${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --port 8080 \
            --memory 4Gi \
            --cpu 2 \
            --allow-unauthenticated \
            --set-env-vars "BIND_HOST=0.0.0.0" \
            --set-env-vars "NODE_ENV=production" \
            --update-secrets "DATABASE_URL=database-url:latest" \
            --update-secrets "DIRECT_URL=direct-url:latest" \
            --set-env-vars "QSTASH_TOKEN=${{ secrets.QSTASH_TOKEN }}" \
            --set-env-vars "QSTASH_CURRENT_SIGNING_KEY=${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}" \
            --set-env-vars "QSTASH_NEXT_SIGNING_KEY=${{ secrets.QSTASH_NEXT_SIGNING_KEY }}" \
            --set-env-vars "UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            --set-env-vars "UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}" \
            --set-env-vars "GEMINI_LIVE_MODEL=${{ secrets.GEMINI_LIVE_MODEL }}" \
            --set-env-vars "GEMINI_LIVE_API_VERSION=${{ secrets.GEMINI_LIVE_API_VERSION }}" \
            --set-env-vars "GEMINI_LIVE_VOICE=${{ secrets.GEMINI_LIVE_VOICE }}" \
            --set-env-vars "DRIVE_FOLDER_ID=${{ secrets.DRIVE_FOLDER_ID }}" \
            --set-env-vars "APP_URL=${{ secrets.APP_URL }}" \
            --set-env-vars "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --set-env-vars "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --set-env-vars "NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS=${{ secrets.NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS }}" \
            --set-env-vars "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --update-secrets "INTERNAL_API_SECRET=internal-api-secret:latest" \
            --update-secrets "DRIVE_WEBHOOK_TOKEN=drive-webhook-token:latest" \
            --set-env-vars "DRIVE_WEBHOOK_CHANNEL_ID=${{ secrets.DRIVE_WEBHOOK_CHANNEL_ID }}" \
            --set-env-vars "GRADING_WORKER_URL=${{ secrets.GRADING_WORKER_URL }}"

      - name: Cloud Run 起動ログ取得 (Web, 失敗時)
        if: failure() && steps.deploy_web.outcome == 'failure'
        run: |
          echo "Cloud Run web deploy failed. Fetching diagnostic logs..."

          REVISION="$(gcloud run services describe sullivan-app-dev \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.latestCreatedRevisionName)' 2>/dev/null || true)"

          if [ -z "$REVISION" ]; then
            echo "Could not determine latest revision."
            exit 0
          fi

          echo "latestCreatedRevision=$REVISION"

          gcloud logging read \
            "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"sullivan-app-dev\" AND resource.labels.revision_name=\"$REVISION\"" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --limit=200 \
            --format='value(timestamp,logName,textPayload,jsonPayload.message,jsonPayload)' \
            || true

  deploy-grading-worker:
    name: Deploy Grading Worker (DEV)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [migrate-db]
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: GCP 認証 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: gcloud CLI セットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: Cloud Run デプロイ (Grading Worker)
        run: |
          gcloud run deploy sullivan-grading-worker-dev \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --service-account "${{ secrets.RUNTIME_SA_EMAIL }}" \
            --source . \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --memory 4Gi \
            --cpu 2 \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=development" \
            --update-secrets "DATABASE_URL=database-url:latest" \
            --update-secrets "DIRECT_URL=direct-url:latest" \
            --set-env-vars "UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            --set-env-vars "UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}" \
            --set-env-vars "GEMINI_LIVE_MODEL=${{ secrets.GEMINI_LIVE_MODEL }}" \
            --set-env-vars "GEMINI_LIVE_API_VERSION=${{ secrets.GEMINI_LIVE_API_VERSION }}" \
            --set-env-vars "GEMINI_LIVE_VOICE=${{ secrets.GEMINI_LIVE_VOICE }}" \
            --set-env-vars "DRIVE_FOLDER_ID=${{ secrets.DRIVE_FOLDER_ID }}" \
            --set-env-vars "QSTASH_CURRENT_SIGNING_KEY=${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}" \
            --set-env-vars "QSTASH_NEXT_SIGNING_KEY=${{ secrets.QSTASH_NEXT_SIGNING_KEY }}"

  migrate-db:
    name: DB マイグレーション (DEV)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 依存関係インストール
        run: npm ci

      - name: Prisma マイグレーション実行
        run: npx prisma migrate deploy
