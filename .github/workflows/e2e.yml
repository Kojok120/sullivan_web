name: E2E Tests

on:
  # 手動実行と特定ラベルのPRで実行
  workflow_dispatch:
  pull_request:
    branches: [main, dev]
    types: [labeled]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # 手動実行時または "e2e" ラベルが付いたPRで実行
    if: github.event_name == 'workflow_dispatch' || contains(github.event.label.name, 'e2e')
    timeout-minutes: 20
    env:
      # Prisma 生成用のダミー接続情報（DBへの実接続は不要）
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: pnpm セットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 依存関係インストール
        # @sullivan/db-schema の postinstall (prisma generate) も同時に走る。
        run: pnpm install --frozen-lockfile

      - name: Playwright ブラウザインストール
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E テスト実行
        run: pnpm exec playwright test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: テストレポートアップロード
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
