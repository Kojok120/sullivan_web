name: Deploy PRODUCTION

on:
  push:
    branches: [main]

# 本番デプロイは同時実行を防ぐ
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  GCP_REGION: asia-northeast1

jobs:
  deploy-web:
    name: Deploy Web App (PRODUCTION)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [migrate-db, deploy-grading-worker]
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: GCP 認証 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: gcloud CLI セットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: 必須シークレット検証 (Web)
        env:
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_CHAT_MODEL: ${{ secrets.GEMINI_CHAT_MODEL }}
          GRADING_WORKER_URL: ${{ secrets.GRADING_WORKER_URL }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
        run: |
          for var in GEMINI_MODEL GEMINI_CHAT_MODEL GRADING_WORKER_URL QSTASH_TOKEN QSTASH_CURRENT_SIGNING_KEY QSTASH_NEXT_SIGNING_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: ${var}"
              exit 1
            fi
          done

      - name: Docker 認証
        run: gcloud auth configure-docker asia.gcr.io --quiet

      - name: Docker ビルド (Web)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS=${{ secrets.NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS }} \
            --build-arg QSTASH_CURRENT_SIGNING_KEY=${{ secrets.QSTASH_CURRENT_SIGNING_KEY }} \
            --build-arg QSTASH_NEXT_SIGNING_KEY=${{ secrets.QSTASH_NEXT_SIGNING_KEY }} \
            -t asia.gcr.io/${{ secrets.GCP_PROJECT_ID }}/sullivan-app-production:${{ github.sha }} \
            .

      - name: Docker プッシュ (Web)
        run: docker push asia.gcr.io/${{ secrets.GCP_PROJECT_ID }}/sullivan-app-production:${{ github.sha }}

      - name: Cloud Run デプロイ (Web)
        run: |
          gcloud run deploy sullivan-app-production \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --service-account "${{ secrets.RUNTIME_SA_EMAIL }}" \
            --image asia.gcr.io/${{ secrets.GCP_PROJECT_ID }}/sullivan-app-production:${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --memory 4Gi \
            --cpu 2 \
            --concurrency 20 \
            --allow-unauthenticated \
            --set-env-vars "BIND_HOST=0.0.0.0,SERVICE_ROLE=web" \
            --set-env-vars "NODE_ENV=production" \
            --update-secrets "DATABASE_URL=database-url:latest" \
            --update-secrets "DIRECT_URL=direct-url:latest" \
            --set-env-vars "QSTASH_TOKEN=${{ secrets.QSTASH_TOKEN }}" \
            --set-env-vars "QSTASH_CURRENT_SIGNING_KEY=${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}" \
            --set-env-vars "QSTASH_NEXT_SIGNING_KEY=${{ secrets.QSTASH_NEXT_SIGNING_KEY }}" \
            --set-env-vars "UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            --set-env-vars "UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}" \
            --set-env-vars "GEMINI_CHAT_MODEL=${{ secrets.GEMINI_CHAT_MODEL }}" \
            --set-env-vars "GEMINI_CHAT_FALLBACK_MODEL=${{ secrets.GEMINI_CHAT_FALLBACK_MODEL }}" \
            --set-env-vars "GEMINI_LIVE_MODEL=${{ secrets.GEMINI_LIVE_MODEL }}" \
            --set-env-vars "GEMINI_LIVE_API_VERSION=${{ secrets.GEMINI_LIVE_API_VERSION }}" \
            --set-env-vars "GEMINI_LIVE_VOICE=${{ secrets.GEMINI_LIVE_VOICE }}" \
            --set-env-vars "DRIVE_FOLDER_ID=${{ secrets.DRIVE_FOLDER_ID }}" \
            --set-env-vars "APP_URL=${{ secrets.APP_URL }}" \
            --set-env-vars "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --set-env-vars "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --set-env-vars "NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS=${{ secrets.NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS }}" \
            --set-env-vars "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --update-secrets "INTERNAL_API_SECRET=internal-api-secret:latest" \
            --update-secrets "DRIVE_WEBHOOK_TOKEN=drive-webhook-token:latest" \
            --set-env-vars "DRIVE_WEBHOOK_CHANNEL_ID=${{ secrets.DRIVE_WEBHOOK_CHANNEL_ID }}" \
            --set-env-vars "GRADING_WORKER_URL=${{ secrets.GRADING_WORKER_URL }}"

  deploy-grading-worker:
    name: Deploy Grading Worker (PRODUCTION)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [migrate-db]
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: GCP 認証 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: gcloud CLI セットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: 必須シークレット検証 (Grading Worker)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RUNTIME_SA_EMAIL: ${{ secrets.RUNTIME_SA_EMAIL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_CHAT_MODEL: ${{ secrets.GEMINI_CHAT_MODEL }}
          GEMINI_LIVE_MODEL: ${{ secrets.GEMINI_LIVE_MODEL }}
          GEMINI_LIVE_API_VERSION: ${{ secrets.GEMINI_LIVE_API_VERSION }}
          GEMINI_LIVE_VOICE: ${{ secrets.GEMINI_LIVE_VOICE }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GRADING_WORKER_URL: ${{ secrets.GRADING_WORKER_URL }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY }}
        run: |
          for var in \
            GCP_PROJECT_ID \
            RUNTIME_SA_EMAIL \
            UPSTASH_REDIS_REST_URL \
            UPSTASH_REDIS_REST_TOKEN \
            GEMINI_API_KEY \
            GEMINI_MODEL \
            GEMINI_CHAT_MODEL \
            GEMINI_LIVE_MODEL \
            GEMINI_LIVE_API_VERSION \
            GEMINI_LIVE_VOICE \
            DRIVE_FOLDER_ID \
            GRADING_WORKER_URL \
            QSTASH_TOKEN \
            QSTASH_CURRENT_SIGNING_KEY \
            QSTASH_NEXT_SIGNING_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: ${var}"
              exit 1
            fi
          done

      - name: Docker 認証
        run: gcloud auth configure-docker asia.gcr.io --quiet

      - name: Docker ビルド (Grading Worker)
        run: |
          docker build \
            -f Dockerfile.worker \
            -t asia.gcr.io/${{ secrets.GCP_PROJECT_ID }}/sullivan-grading-worker-production:${{ github.sha }} \
            .

      - name: Docker プッシュ (Grading Worker)
        run: docker push asia.gcr.io/${{ secrets.GCP_PROJECT_ID }}/sullivan-grading-worker-production:${{ github.sha }}

      - name: Cloud Run デプロイ (Grading Worker)
        run: |
          gcloud run deploy sullivan-grading-worker-production \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --service-account "${{ secrets.RUNTIME_SA_EMAIL }}" \
            --image asia.gcr.io/${{ secrets.GCP_PROJECT_ID }}/sullivan-grading-worker-production:${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --memory 4Gi \
            --cpu 2 \
            --concurrency 1 \
            --min-instances 10 \
            --max-instances 50 \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production,SERVICE_ROLE=worker" \
            --update-secrets "DATABASE_URL=database-url:latest" \
            --update-secrets "DIRECT_URL=direct-url:latest" \
            --update-secrets "INTERNAL_API_SECRET=internal-api-secret:latest" \
            --set-env-vars "UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            --set-env-vars "UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}" \
            --set-env-vars "GEMINI_CHAT_MODEL=${{ secrets.GEMINI_CHAT_MODEL }}" \
            --set-env-vars "GEMINI_CHAT_FALLBACK_MODEL=${{ secrets.GEMINI_CHAT_FALLBACK_MODEL }}" \
            --set-env-vars "GEMINI_LIVE_MODEL=${{ secrets.GEMINI_LIVE_MODEL }}" \
            --set-env-vars "GEMINI_LIVE_API_VERSION=${{ secrets.GEMINI_LIVE_API_VERSION }}" \
            --set-env-vars "GEMINI_LIVE_VOICE=${{ secrets.GEMINI_LIVE_VOICE }}" \
            --set-env-vars "DRIVE_FOLDER_ID=${{ secrets.DRIVE_FOLDER_ID }}" \
            --set-env-vars "GRADING_WORKER_URL=${{ secrets.GRADING_WORKER_URL }}" \
            --set-env-vars "QSTASH_TOKEN=${{ secrets.QSTASH_TOKEN }}" \
            --set-env-vars "QSTASH_CURRENT_SIGNING_KEY=${{ secrets.QSTASH_CURRENT_SIGNING_KEY }}" \
            --set-env-vars "QSTASH_NEXT_SIGNING_KEY=${{ secrets.QSTASH_NEXT_SIGNING_KEY }}"

  migrate-db:
    name: DB マイグレーション (PRODUCTION)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 依存関係インストール
        run: npm ci

      - name: Prisma マイグレーション実行
        run: npx prisma migrate deploy

  notify-discord:
    name: Discord 通知 (PRODUCTION)
    runs-on: ubuntu-latest
    needs: [migrate-db, deploy-grading-worker, deploy-web]
    if: always()
    environment: production

    steps:
      - name: Discord Webhook 設定確認
        id: webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL が未設定のため、Discord 通知をスキップします。"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Discord に通知
        if: steps.webhook.outputs.enabled == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ERROR_MENTION: ${{ secrets.DISCORD_ERROR_MENTION }}
          MIGRATE_RESULT: ${{ needs.migrate-db.result }}
          WORKER_RESULT: ${{ needs.deploy-grading-worker.result }}
          WEB_RESULT: ${{ needs.deploy-web.result }}
        run: |
          STATUS="成功"
          MENTION_PREFIX=""
          ALLOWED_MENTIONS='{"parse":[]}'
          if [ "$MIGRATE_RESULT" != "success" ] || [ "$WORKER_RESULT" != "success" ] || [ "$WEB_RESULT" != "success" ]; then
            STATUS="失敗"
            if [ -n "$DISCORD_ERROR_MENTION" ]; then
              MENTION_PREFIX="$(printf '%s\n' "$DISCORD_ERROR_MENTION")"
              ALLOWED_MENTIONS='{"parse":["users","roles"]}'
            fi
          fi

          SHORT_SHA="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          MESSAGE_BODY="$(printf '%s\n' \
            "[Sullivan] production デプロイ${STATUS}" \
            "repo: ${GITHUB_REPOSITORY}" \
            "branch: ${GITHUB_REF_NAME}" \
            "actor: ${GITHUB_ACTOR}" \
            "commit: ${SHORT_SHA} ${COMMIT_URL}" \
            "web: ${WEB_RESULT}" \
            "worker: ${WORKER_RESULT}" \
            "db: ${MIGRATE_RESULT}" \
            "run: ${RUN_URL}")"

          if [ -n "$MENTION_PREFIX" ]; then
            MESSAGE="$(printf '%s\n%s' "$MENTION_PREFIX" "$MESSAGE_BODY")"
          else
            MESSAGE="$MESSAGE_BODY"
          fi

          PAYLOAD="$(jq -nc \
            --arg content "$MESSAGE" \
            --argjson allowedMentions "$ALLOWED_MENTIONS" \
            '{content: $content, allowed_mentions: $allowedMentions}')"
          curl -fsS -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
