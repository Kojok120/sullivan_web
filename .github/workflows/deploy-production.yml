name: Deploy PRODUCTION

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  GCP_REGION: asia-northeast1

jobs:
  migrate-db:
    name: DB マイグレーション (PRODUCTION)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prisma マイグレーション実行
        # `prisma migrate deploy` は CLI のみで動くため、prod 用の依存全体をインストールせず
        # package.json の prisma / dotenv バージョンをピンして必要最小限のみ追加インストールする。
        # SemVer 接頭辞 (^, ~ 等) を剥がして範囲解決にならないよう exact pin する。
        # npx の -p ではなく `npm install --no-save` で project の node_modules に置くのは、
        # prisma.config.ts の `import "dotenv/config"` を Node の resolution が cwd から辿れるようにするため。
        # postinstall (prisma generate) は migrate には不要なので --ignore-scripts でスキップする
        run: |
          PRISMA_VERSION="$(node -p "((require('./package.json').devDependencies.prisma) || (require('./package.json').dependencies.prisma)).replace(/^[\^~>=<]+/, '')")"
          DOTENV_VERSION="$(node -p "((require('./package.json').dependencies.dotenv) || (require('./package.json').devDependencies.dotenv)).replace(/^[\^~>=<]+/, '')")"
          npm install --no-save --no-audit --no-fund --ignore-scripts \
            "prisma@${PRISMA_VERSION}" "dotenv@${DOTENV_VERSION}"
          ./node_modules/.bin/prisma migrate deploy

  deploy-grading-worker:
    name: Deploy Grading Worker (PRODUCTION)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate-db]
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: GCP 認証 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: gcloud CLI セットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: デプロイ設定ファイル生成 (PRODUCTION Worker)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RUNTIME_SA_EMAIL: ${{ secrets.RUNTIME_SA_EMAIL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_CHAT_MODEL: ${{ secrets.GEMINI_CHAT_MODEL }}
          GEMINI_CHAT_FALLBACK_MODEL: ${{ secrets.GEMINI_CHAT_FALLBACK_MODEL }}
          GEMINI_LIVE_MODEL: ${{ secrets.GEMINI_LIVE_MODEL }}
          GEMINI_LIVE_API_VERSION: ${{ secrets.GEMINI_LIVE_API_VERSION }}
          GEMINI_LIVE_VOICE: ${{ secrets.GEMINI_LIVE_VOICE }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GRADING_WORKER_URL: ${{ secrets.GRADING_WORKER_URL }}
          CLOUD_TASKS_LOCATION: ${{ secrets.CLOUD_TASKS_LOCATION }}
          GRADING_TASK_QUEUE: ${{ secrets.GRADING_TASK_QUEUE }}
          DRIVE_CHECK_TASK_QUEUE: ${{ secrets.DRIVE_CHECK_TASK_QUEUE }}
          CLOUD_TASKS_CALLER_SERVICE_ACCOUNT: ${{ secrets.CLOUD_TASKS_CALLER_SERVICE_ACCOUNT }}
          WORKER_SCHEDULER_CALLER_SERVICE_ACCOUNT: ${{ secrets.WORKER_SCHEDULER_CALLER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          for var in GCP_PROJECT_ID RUNTIME_SA_EMAIL INTERNAL_API_SECRET GEMINI_API_KEY DRIVE_FOLDER_ID; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: ${var}"
              exit 1
            fi
          done

          WORKER_URL="$(gcloud run services describe sullivan-grading-worker-production \
            --project "$GCP_PROJECT_ID" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)' 2>/dev/null || true)"

          if [ -z "$WORKER_URL" ]; then
            WORKER_URL="${GRADING_WORKER_URL:-}"
          fi

          if [ -z "$WORKER_URL" ]; then
            echo "Missing required secret: GRADING_WORKER_URL"
            exit 1
          fi

          cat > .env.PRODUCTION <<EOF
          GOOGLE_CLOUD_PROJECT_ID=$GCP_PROJECT_ID
          RUNTIME_SA_EMAIL=$RUNTIME_SA_EMAIL
          INTERNAL_API_SECRET=$INTERNAL_API_SECRET
          GEMINI_API_KEY=$GEMINI_API_KEY
          GEMINI_MODEL=${GEMINI_MODEL:-}
          GEMINI_CHAT_MODEL=${GEMINI_CHAT_MODEL:-}
          GEMINI_CHAT_FALLBACK_MODEL=${GEMINI_CHAT_FALLBACK_MODEL:-}
          GEMINI_LIVE_MODEL=${GEMINI_LIVE_MODEL:-}
          GEMINI_LIVE_API_VERSION=${GEMINI_LIVE_API_VERSION:-}
          GEMINI_LIVE_VOICE=${GEMINI_LIVE_VOICE:-}
          DRIVE_FOLDER_ID=$DRIVE_FOLDER_ID
          GRADING_WORKER_URL=$WORKER_URL
          CLOUD_TASKS_LOCATION=${CLOUD_TASKS_LOCATION:-asia-northeast1}
          GRADING_TASK_QUEUE=${GRADING_TASK_QUEUE:-sullivan-grading}
          DRIVE_CHECK_TASK_QUEUE=${DRIVE_CHECK_TASK_QUEUE:-sullivan-drive-check}
          CLOUD_TASKS_CALLER_SERVICE_ACCOUNT=${CLOUD_TASKS_CALLER_SERVICE_ACCOUNT:-$RUNTIME_SA_EMAIL}
          WORKER_SCHEDULER_CALLER_SERVICE_ACCOUNT=${WORKER_SCHEDULER_CALLER_SERVICE_ACCOUNT:-$RUNTIME_SA_EMAIL}
          CLOUD_RUN_REGION=${{ env.GCP_REGION }}
          SKIP_INFRA_SETUP=1
          EOF

      - name: Worker デプロイ (PRODUCTION)
        run: ./deploy-grading-worker-PRODUCTION.sh

  deploy-web:
    name: Deploy Web App (PRODUCTION)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # web は worker のビルド成果物に依存しない（worker URL は gcloud describe で解決）。
    # クリティカルパス短縮のため worker と並列に走らせる
    needs: [migrate-db]
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: GCP 認証 (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: gcloud CLI セットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: デプロイ設定ファイル生成 (PRODUCTION Web)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          RUNTIME_SA_EMAIL: ${{ secrets.RUNTIME_SA_EMAIL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS: ${{ secrets.NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_CHAT_MODEL: ${{ secrets.GEMINI_CHAT_MODEL }}
          GEMINI_CHAT_FALLBACK_MODEL: ${{ secrets.GEMINI_CHAT_FALLBACK_MODEL }}
          GEMINI_LIVE_MODEL: ${{ secrets.GEMINI_LIVE_MODEL }}
          GEMINI_LIVE_API_VERSION: ${{ secrets.GEMINI_LIVE_API_VERSION }}
          GEMINI_LIVE_VOICE: ${{ secrets.GEMINI_LIVE_VOICE }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          DRIVE_WEBHOOK_CHANNEL_ID: ${{ secrets.DRIVE_WEBHOOK_CHANNEL_ID }}
          DRIVE_WEBHOOK_CHANNEL_ID_FIXED: ${{ secrets.DRIVE_WEBHOOK_CHANNEL_ID_FIXED }}
          DRIVE_WATCH_RENEW_THRESHOLD_HOURS: ${{ secrets.DRIVE_WATCH_RENEW_THRESHOLD_HOURS }}
          DRIVE_WATCH_STATE_KEY: ${{ secrets.DRIVE_WATCH_STATE_KEY }}
          GRADING_WORKER_URL: ${{ secrets.GRADING_WORKER_URL }}
          CLOUD_TASKS_LOCATION: ${{ secrets.CLOUD_TASKS_LOCATION }}
          GRADING_TASK_QUEUE: ${{ secrets.GRADING_TASK_QUEUE }}
          DRIVE_CHECK_TASK_QUEUE: ${{ secrets.DRIVE_CHECK_TASK_QUEUE }}
          CLOUD_TASKS_CALLER_SERVICE_ACCOUNT: ${{ secrets.CLOUD_TASKS_CALLER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          for var in \
            GCP_PROJECT_ID \
            RUNTIME_SA_EMAIL \
            INTERNAL_API_SECRET \
            APP_URL \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            SUPABASE_SERVICE_ROLE_KEY \
            GEMINI_API_KEY \
            DRIVE_FOLDER_ID \
            DRIVE_WATCH_STATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: ${var}"
              exit 1
            fi
          done

          WORKER_URL="$(gcloud run services describe sullivan-grading-worker-production \
            --project "$GCP_PROJECT_ID" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)' 2>/dev/null || true)"

          if [ -z "$WORKER_URL" ]; then
            WORKER_URL="${GRADING_WORKER_URL:-}"
          fi

          if [ -z "$WORKER_URL" ]; then
            echo "Missing required secret: GRADING_WORKER_URL"
            exit 1
          fi

          cat > .env.PRODUCTION <<EOF
          GOOGLE_CLOUD_PROJECT_ID=$GCP_PROJECT_ID
          RUNTIME_SA_EMAIL=$RUNTIME_SA_EMAIL
          INTERNAL_API_SECRET=$INTERNAL_API_SECRET
          APP_URL=$APP_URL
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
          NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS=${NEXT_PUBLIC_GEMINI_SILENCE_HOLD_MS:-500}
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          GEMINI_API_KEY=$GEMINI_API_KEY
          GEMINI_MODEL=${GEMINI_MODEL:-}
          GEMINI_CHAT_MODEL=${GEMINI_CHAT_MODEL:-}
          GEMINI_CHAT_FALLBACK_MODEL=${GEMINI_CHAT_FALLBACK_MODEL:-}
          GEMINI_LIVE_MODEL=${GEMINI_LIVE_MODEL:-}
          GEMINI_LIVE_API_VERSION=${GEMINI_LIVE_API_VERSION:-}
          GEMINI_LIVE_VOICE=${GEMINI_LIVE_VOICE:-}
          DRIVE_FOLDER_ID=$DRIVE_FOLDER_ID
          DRIVE_WEBHOOK_CHANNEL_ID=${DRIVE_WEBHOOK_CHANNEL_ID:-}
          DRIVE_WEBHOOK_CHANNEL_ID_FIXED=${DRIVE_WEBHOOK_CHANNEL_ID_FIXED:-false}
          DRIVE_WATCH_RENEW_THRESHOLD_HOURS=${DRIVE_WATCH_RENEW_THRESHOLD_HOURS:-18}
          DRIVE_WATCH_STATE_KEY=$DRIVE_WATCH_STATE_KEY
          GRADING_WORKER_URL=$WORKER_URL
          CLOUD_TASKS_LOCATION=${CLOUD_TASKS_LOCATION:-asia-northeast1}
          GRADING_TASK_QUEUE=${GRADING_TASK_QUEUE:-sullivan-grading}
          DRIVE_CHECK_TASK_QUEUE=${DRIVE_CHECK_TASK_QUEUE:-sullivan-drive-check}
          CLOUD_TASKS_CALLER_SERVICE_ACCOUNT=${CLOUD_TASKS_CALLER_SERVICE_ACCOUNT:-$RUNTIME_SA_EMAIL}
          SKIP_INFRA_SETUP=1
          EOF

      - name: Web デプロイ (PRODUCTION)
        id: deploy_web
        run: ./deploy-web-PRODUCTION.sh

      - name: Drive watch 再作成 (PRODUCTION)
        env:
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
        run: |
          set -euo pipefail

          SERVICE_URL="$(gcloud run services describe sullivan-app-production \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)')"

          curl --fail --silent --show-error \
            -X POST "${SERVICE_URL}/api/drive/watch/renew?check=1" \
            -H "Authorization: Bearer ${INTERNAL_API_SECRET}" >/dev/null

      - name: Cloud Run 起動ログ取得 (Web, 失敗時)
        if: failure() && steps.deploy_web.outcome == 'failure'
        run: |
          echo "Cloud Run web deploy failed. Fetching diagnostic logs..."

          REVISION="$(gcloud run services describe sullivan-app-production \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.latestCreatedRevisionName)' 2>/dev/null || true)"

          if [ -z "$REVISION" ]; then
            echo "Could not determine latest revision."
            exit 0
          fi

          echo "latestCreatedRevision=$REVISION"

          gcloud logging read \
            "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"sullivan-app-production\" AND resource.labels.revision_name=\"$REVISION\"" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --limit=200 \
            --format='value(timestamp,logName,textPayload,jsonPayload.message,jsonPayload)' \
            || true

  notify-discord:
    name: Discord 通知 (PRODUCTION)
    runs-on: ubuntu-latest
    needs: [migrate-db, deploy-grading-worker, deploy-web]
    if: always()
    environment: production

    steps:
      - name: Discord Webhook 設定確認
        id: webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL が未設定のため、Discord 通知をスキップします。"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Discord に通知
        if: steps.webhook.outputs.enabled == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ERROR_MENTION: ${{ secrets.DISCORD_ERROR_MENTION }}
          MIGRATE_RESULT: ${{ needs.migrate-db.result }}
          WORKER_RESULT: ${{ needs.deploy-grading-worker.result }}
          WEB_RESULT: ${{ needs.deploy-web.result }}
        run: |
          STATUS="成功"
          MENTION_PREFIX=""
          ALLOWED_MENTIONS='{"parse":[]}'
          if [ "$MIGRATE_RESULT" != "success" ] || [ "$WORKER_RESULT" != "success" ] || [ "$WEB_RESULT" != "success" ]; then
            STATUS="失敗"
            if [ -n "$DISCORD_ERROR_MENTION" ]; then
              MENTION_PREFIX="$(printf '%s\n' "$DISCORD_ERROR_MENTION")"
              ALLOWED_MENTIONS='{"parse":["users","roles"]}'
            fi
          fi

          SHORT_SHA="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          MESSAGE_BODY="$(printf '%s\n' \
            "[Sullivan] production デプロイ${STATUS}" \
            "repo: ${GITHUB_REPOSITORY}" \
            "branch: ${GITHUB_REF_NAME}" \
            "actor: ${GITHUB_ACTOR}" \
            "commit: ${SHORT_SHA} ${COMMIT_URL}" \
            "web: ${WEB_RESULT}" \
            "worker: ${WORKER_RESULT}" \
            "db: ${MIGRATE_RESULT}" \
            "run: ${RUN_URL}")"

          if [ -n "$MENTION_PREFIX" ]; then
            MESSAGE="$(printf '%s\n%s' "$MENTION_PREFIX" "$MESSAGE_BODY")"
          else
            MESSAGE="$MESSAGE_BODY"
          fi

          jq -n \
            --arg content "$MESSAGE" \
            --argjson allowed_mentions "$ALLOWED_MENTIONS" \
            '{content: $content, allowed_mentions: $allowed_mentions}' \
            | curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d @-
