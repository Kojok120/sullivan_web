name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# 同一ブランチでの重複実行をキャンセル
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: Lint / Type Check / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma 生成用のダミー接続情報（DBへの実接続は不要）
      DATABASE_URL: "postgresql://ci@localhost:5432/ci?schema=public"
      DIRECT_URL: "postgresql://ci@localhost:5432/ci?schema=public"

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Prisma マイグレーション同梱チェック
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED_FILES="$(git diff --name-only --diff-filter=AM "origin/${{ github.base_ref }}" "HEAD")"

          if echo "$CHANGED_FILES" | grep -q '^prisma/schema\.prisma$'; then
            if ! echo "$CHANGED_FILES" | grep -q '^prisma/migrations/'; then
              echo "::error::prisma/schema.prisma を変更した場合は prisma/migrations/ の変更も同梱してください。"
              exit 1
            fi
          fi

      - name: pnpm セットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 依存関係インストール
        # @sullivan/db-schema の postinstall (prisma generate) も同時に走る。
        run: pnpm install --frozen-lockfile

      - name: ユニットテスト
        run: pnpm test

      - name: ESLint
        # TODO: 既存のlintエラー修正後に continue-on-error を削除する
        continue-on-error: true
        run: pnpm exec eslint src/

      - name: TypeScript 型チェック
        run: pnpm exec tsc --noEmit

      - name: Next.js ビルド
        run: pnpm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          # CIではビルドが通ることのみ検証（ダミー値）
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"

      - name: バンドル予算チェック
        # .bundle-budget.json の routes が空なら計測レポートのみ。
        # 値を埋めると上限超過時にこのステップが落ちる。
        run: node scripts/check-bundle-budget.mjs
