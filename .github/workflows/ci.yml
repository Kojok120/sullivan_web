name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# 同一ブランチでの重複実行をキャンセル
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: Lint / Type Check / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma 生成用のダミー接続情報（DBへの実接続は不要）
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 依存関係インストール
        run: npm ci

      - name: Prisma クライアント生成
        run: npx prisma generate

      - name: ユニットテスト
        run: npm test

      - name: ESLint
        # TODO: 既存のlintエラー修正後に continue-on-error を削除する
        continue-on-error: true
        run: npx eslint src/

      - name: TypeScript 型チェック
        run: npx tsc --noEmit

      - name: Next.js ビルド
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          # CIではビルドが通ることのみ検証（ダミー値）
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
